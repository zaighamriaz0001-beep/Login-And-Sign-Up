<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="login.css">
  <title>Practice</title>
</head>

<body>

  <div class="container">
    <div class="login-section">
      <img src="image.png" alt="image">
      <div class="login">
        <h1>Login</h1>
        <form>
          <h2>Enter Email: </h2>
          <input type="email" required placeholder="Enter Your Email" title="What's Your Email">
          <h2>Enter Password: </h2>
          <input type="password" required placeholder="Enter Your Password" title="Your old Password">
          <button type="submit">Submit</button>
        </form>
        <p>If Not Account then <a href="signup.html">Sign up</a></p>
      </div>
    </div>
  </div>

</body>

</html>
