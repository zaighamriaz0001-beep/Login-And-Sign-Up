<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="signup.css">
    <title>Practice</title>
</head>

<body>

    <div class="container">
        <div class="signup-section">
            <div class="signup">
                <h1>Sign Up</h1>
                <form>
                    <h2>Enter Name: </h2>
                    <input type="text" required placeholder="Enter Your Name" title="What's your Name">
                    <h2>Enter Email: </h2>
                    <input type="email" required placeholder="Enter Password" title="What's your Email">
                    <h2>Select Gender</h2>
                    <input type="radio" name="gender" id="male">
                    <label for="male">Male</label>
                    <input type="radio" name="gender" id="female">
                    <label for="female">Female</label><br>
                    <h2>Enter Password: </h2>
                    <input type="password" required placeholder="Enter Your Password" title="Enter Strong Password"><br>
                    <button type="submit">Submit</button>
                </form>
                <p>Already Account then <a href="login.html">Login</a></p>
            </div>
            <img src="image.png" alt="image">
        </div>
    </div>

</body>

</html>
